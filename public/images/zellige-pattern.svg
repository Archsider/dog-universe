<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Motif zellige marocain — Dog Universe">
  <defs>
    <!-- One tileable repeat unit, 200x200 -->
    <pattern id="zellige" x="0" y="0" width="200" height="200" patternUnits="userSpaceOnUse">
      <!-- Dark background -->
      <rect width="200" height="200" fill="#0E0E12"/>

      <!-- ── Center 8-pointed star (khatim) at (100,100) ─────────────────
           Formed by 2 squares rotated 45° around the center; here rendered
           as a single 16-vertex star polygon. Outer radius = 50, inner = 38. -->
      <polygon
        points="100,50 107.8,79.4 130.3,58.6 121.2,87 150,80.9 130.3,100 150,119.1 121.2,113 130.3,141.4 107.8,120.6 100,150 92.2,120.6 69.7,141.4 78.8,113 50,119.1 69.7,100 50,80.9 78.8,87 69.7,58.6 92.2,79.4"
        fill="none" stroke="#D4B26A" stroke-width="2.5" stroke-linejoin="round"/>

      <!-- Corner quarter-stars so the pattern tiles seamlessly -->
      <polygon
        points="0,-50 7.8,-20.6 30.3,-41.4 21.2,-13 50,-19.1 30.3,0 50,19.1 21.2,13 30.3,41.4 7.8,20.6 0,50 -7.8,20.6 -30.3,41.4 -21.2,13 -50,19.1 -30.3,0 -50,-19.1 -21.2,-13 -30.3,-41.4 -7.8,-20.6"
        fill="none" stroke="#D4B26A" stroke-width="2.5" stroke-linejoin="round"/>
      <polygon
        points="200,-50 207.8,-20.6 230.3,-41.4 221.2,-13 250,-19.1 230.3,0 250,19.1 221.2,13 230.3,41.4 207.8,20.6 200,50 192.2,20.6 169.7,41.4 178.8,13 150,19.1 169.7,0 150,-19.1 178.8,-13 169.7,-41.4 192.2,-20.6"
        fill="none" stroke="#D4B26A" stroke-width="2.5" stroke-linejoin="round"/>
      <polygon
        points="0,150 7.8,179.4 30.3,158.6 21.2,187 50,180.9 30.3,200 50,219.1 21.2,213 30.3,241.4 7.8,220.6 0,250 -7.8,220.6 -30.3,241.4 -21.2,213 -50,219.1 -30.3,200 -50,180.9 -21.2,187 -30.3,158.6 -7.8,179.4"
        fill="none" stroke="#D4B26A" stroke-width="2.5" stroke-linejoin="round"/>
      <polygon
        points="200,150 207.8,179.4 230.3,158.6 221.2,187 250,180.9 230.3,200 250,219.1 221.2,213 230.3,241.4 207.8,220.6 200,250 192.2,220.6 169.7,241.4 178.8,213 150,219.1 169.7,200 150,180.9 178.8,187 169.7,158.6 192.2,179.4"
        fill="none" stroke="#D4B26A" stroke-width="2.5" stroke-linejoin="round"/>

      <!-- ── Connecting octagons / diamonds between stars ────────────────
           Classic zellige: between 4 stars sits a rotated square/octagon. -->
      <polygon points="100,0 114,14 100,28 86,14" fill="none" stroke="#D4B26A" stroke-width="2" stroke-linejoin="round"/>
      <polygon points="100,172 114,186 100,200 86,186" fill="none" stroke="#D4B26A" stroke-width="2" stroke-linejoin="round"/>
      <polygon points="0,100 14,86 28,100 14,114" fill="none" stroke="#D4B26A" stroke-width="2" stroke-linejoin="round"/>
      <polygon points="172,100 186,86 200,100 186,114" fill="none" stroke="#D4B26A" stroke-width="2" stroke-linejoin="round"/>

      <!-- Small inner diamonds to enrich the lacework -->
      <polygon points="100,70 108,78 100,86 92,78" fill="none" stroke="#D4B26A" stroke-width="1.2"/>
      <polygon points="100,130 108,122 100,114 92,122" fill="none" stroke="#D4B26A" stroke-width="1.2"/>
      <polygon points="70,100 78,108 86,100 78,92" fill="none" stroke="#D4B26A" stroke-width="1.2"/>
      <polygon points="130,100 122,108 114,100 122,92" fill="none" stroke="#D4B26A" stroke-width="1.2"/>
    </pattern>
  </defs>

  <!-- Render one tile for preview; use as CSS background-image via url() to tile -->
  <rect width="200" height="200" fill="url(#zellige)"/>
</svg>
