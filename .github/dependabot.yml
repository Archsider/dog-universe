version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    assignees:
      - archsider
    reviewers:
      - archsider
    groups:
      minor-and-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch
        patterns:
          - "*"
        exclude-patterns:
          - "@types/*"
          - "eslint*"
          - "vitest*"
          - "@vitest/*"
          - "@playwright/*"
          - "playwright*"
          - "typescript"
      dev-dependencies:
        applies-to: version-updates
        dependency-type: development
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    assignees:
      - archsider
    reviewers:
      - archsider
