name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npx tsc --noEmit

  build:
    name: Build
    needs: typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NEXTAUTH_SECRET: ci-secret-placeholder
      NEXTAUTH_URL: http://localhost:3000
      AUTH_SECRET: ci-secret-placeholder
      DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
      DIRECT_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
      SUPABASE_URL: https://placeholder.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: ci-placeholder
      SUPABASE_STORAGE_BUCKET: uploads
      SUPABASE_PRIVATE_STORAGE_BUCKET: uploads-private
      EMAIL_SERVER_HOST: smtp.placeholder.invalid
      EMAIL_SERVER_PORT: "587"
      EMAIL_SERVER_USER: ci@placeholder.invalid
      EMAIL_SERVER_PASSWORD: ci-placeholder
      EMAIL_FROM: ci@placeholder.invalid
      CRON_SECRET: ci-cron-placeholder
      NEXT_PUBLIC_SENTRY_DSN: ""
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm run build

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm audit --audit-level=high
