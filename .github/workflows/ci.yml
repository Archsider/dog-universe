name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same PR/branch to save CI minutes.
# main pushes are not cancelled (cancel-in-progress only on PRs).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npx tsc --noEmit

  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm test

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NEXTAUTH_SECRET: ci-secret-placeholder
      NEXTAUTH_URL: http://localhost:3000
      AUTH_SECRET: ci-secret-placeholder
      DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
      DIRECT_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
      SUPABASE_URL: https://placeholder.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: ci-placeholder
      SUPABASE_STORAGE_BUCKET: uploads
      SUPABASE_PRIVATE_STORAGE_BUCKET: uploads-private
      EMAIL_SERVER_HOST: smtp.placeholder.invalid
      EMAIL_SERVER_PORT: "587"
      EMAIL_SERVER_USER: ci@placeholder.invalid
      EMAIL_SERVER_PASSWORD: ci-placeholder
      EMAIL_FROM: ci@placeholder.invalid
      CRON_SECRET: ci-cron-placeholder
      NEXT_PUBLIC_SENTRY_DSN: ""
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - name: Run database migrations
        # Skips gracefully when DATABASE_URL secret is absent (forks, PRs without secrets).
        if: ${{ secrets.DATABASE_URL != '' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npx prisma migrate deploy
      - run: npm run build

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm audit --audit-level=high

  # E2E Playwright : exécuté APRÈS build + test.
  # Bloque le CI quand les secrets sont disponibles (push sur main depuis le dépôt principal).
  # Les forks sans secrets skippent gracieusement via test.skip() dans beforeEach — CI vert.
  # Cible la production (PLAYWRIGHT_BASE_URL=https://app.doguniverse.ma).
  e2e:
    name: E2E (Playwright)
    needs: [build, test]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PLAYWRIGHT_BASE_URL: https://app.doguniverse.ma
      TEST_CLIENT_EMAIL: ${{ secrets.TEST_CLIENT_EMAIL }}
      TEST_CLIENT_PASSWORD: ${{ secrets.TEST_CLIENT_PASSWORD }}
      TEST_CLIENT_NAME: ${{ secrets.TEST_CLIENT_NAME }}
      TEST_ADMIN_EMAIL: ${{ secrets.TEST_ADMIN_EMAIL }}
      TEST_ADMIN_PASSWORD: ${{ secrets.TEST_ADMIN_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
      - name: Run Playwright tests
        if: env.TEST_CLIENT_EMAIL != ''
        env:
          PLAYWRIGHT_BASE_URL: https://app.doguniverse.ma
          TEST_CLIENT_EMAIL: ${{ secrets.TEST_CLIENT_EMAIL }}
          TEST_CLIENT_PASSWORD: ${{ secrets.TEST_CLIENT_PASSWORD }}
          TEST_CLIENT_NAME: ${{ secrets.TEST_CLIENT_NAME }}
          TEST_ADMIN_EMAIL: ${{ secrets.TEST_ADMIN_EMAIL }}
          TEST_ADMIN_PASSWORD: ${{ secrets.TEST_ADMIN_PASSWORD }}
        run: npx playwright test
      - name: Run Playwright tests (secrets absent — graceful skip)
        if: env.TEST_CLIENT_EMAIL == ''
        run: npx playwright test
        env:
          PLAYWRIGHT_BASE_URL: https://app.doguniverse.ma
      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14
