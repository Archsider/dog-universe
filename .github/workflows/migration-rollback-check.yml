name: Migration Rollback Check

on:
  push:
    branches: [main]
    paths:
      - 'prisma/migrations/**'
      - 'scripts/db-rollback.mjs'
      - 'scripts/db-migrate.mjs'
      - '.github/workflows/migration-rollback-check.yml'
  pull_request:
    branches: [main]
    paths:
      - 'prisma/migrations/**'
      - 'scripts/db-rollback.mjs'
      - 'scripts/db-migrate.mjs'
      - '.github/workflows/migration-rollback-check.yml'

concurrency:
  group: rollback-check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  rollback-check:
    name: Up → schema → down → schema (no drift)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rollback
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      PGHOST: localhost
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: rollback

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install postgresql-client (pg_dump)
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Unit tests for the rollback parser
        run: npx vitest run scripts/__tests__/db-rollback.test.mjs

      - name: Up → down → schema-equivalence loop
        # Two passes :
        #   PASS 1 — bootstrap : applique TOUTES les migrations < CUTOFF dans
        #     l'ordre, sans tester le rollback. Indispensable car les migrations
        #     récentes référencent des tables/colonnes créées par les anciennes
        #     (ex: 20260511_invoice_sequence dépend d'Invoice).
        #   PASS 2 — pour chaque migration >= CUTOFF avec down.sql actionnable :
        #     1. snapshot schéma AVANT (pg_dump -s).
        #     2. apply migration.sql.
        #     3. apply down.sql via db-rollback.mjs.
        #     4. snapshot schéma APRÈS — doit égaler AVANT.
        # Any drift fails the job.
        run: |
          set -euo pipefail
          MIG_DIR=prisma/migrations
          CUTOFF_EPOCH=$(date -d '90 days ago' +%s)
          FAIL=0
          psql -c 'CREATE TABLE IF NOT EXISTS "_app_migrations" (name TEXT PRIMARY KEY, checksum TEXT, applied_at TIMESTAMP DEFAULT NOW());'

          ALL=$(ls -1 "$MIG_DIR" | sort)

          # PASS 1 : bootstrap with everything older than the cutoff.
          echo "[rollback-check] === bootstrap (migrations < 90 days) ==="
          for d in $ALL; do
            ymd="${d%%_*}"
            [[ "$ymd" =~ ^[0-9]{8}$ ]] || continue
            iso="${ymd:0:4}-${ymd:4:2}-${ymd:6:2}"
            mig_epoch=$(date -d "$iso" +%s 2>/dev/null || echo 0)
            [ "$mig_epoch" -lt "$CUTOFF_EPOCH" ] || continue
            up="$MIG_DIR/$d/migration.sql"
            [ -f "$up" ] || continue
            echo "[bootstrap] $d"
            psql -v ON_ERROR_STOP=1 -f "$up" > /dev/null
            psql -c "INSERT INTO \"_app_migrations\"(name) VALUES ('$d') ON CONFLICT DO NOTHING;" > /dev/null
          done

          # PASS 2 : up → down equivalence on recent migrations only.
          echo "[rollback-check] === recent migrations (>= 90 days) ==="
          for d in $ALL; do
            name="$d"
            ymd="${name%%_*}"
            [[ "$ymd" =~ ^[0-9]{8}$ ]] || continue
            iso="${ymd:0:4}-${ymd:4:2}-${ymd:6:2}"
            mig_epoch=$(date -d "$iso" +%s 2>/dev/null || echo 0)
            [ "$mig_epoch" -ge "$CUTOFF_EPOCH" ] || continue

            up="$MIG_DIR/$name/migration.sql"
            down="$MIG_DIR/$name/down.sql"
            [ -f "$up" ] || continue
            if [ ! -f "$down" ]; then
              echo "[rollback-check] $name: no down.sql — skip"
              continue
            fi
            if head -n 5 "$down" | grep -qiE '^--\s*@rollback:\s*not-applicable'; then
              echo "[rollback-check] $name: marked not-applicable — skip"
              continue
            fi

            echo "[rollback-check] === $name ==="
            pg_dump -s --no-owner --no-privileges > /tmp/before.sql
            psql -v ON_ERROR_STOP=1 -f "$up"
            psql -c "INSERT INTO \"_app_migrations\"(name) VALUES ('$name') ON CONFLICT DO NOTHING;" > /dev/null
            pg_dump -s --no-owner --no-privileges > /tmp/after_up.sql
            node scripts/db-rollback.mjs "$name"
            pg_dump -s --no-owner --no-privileges > /tmp/after_down.sql

            if ! diff -q /tmp/before.sql /tmp/after_down.sql > /dev/null; then
              echo "::error::Rollback drift detected for $name"
              diff /tmp/before.sql /tmp/after_down.sql || true
              FAIL=1
            else
              echo "[rollback-check] $name: schema restored cleanly"
            fi
          done
          exit $FAIL
