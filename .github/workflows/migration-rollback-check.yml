name: Migration Rollback Check

on:
  push:
    branches: [main]
    paths:
      - 'prisma/migrations/**'
      - 'scripts/db-rollback.mjs'
      - 'scripts/db-migrate.mjs'
      - '.github/workflows/migration-rollback-check.yml'
  pull_request:
    branches: [main]
    paths:
      - 'prisma/migrations/**'
      - 'scripts/db-rollback.mjs'
      - 'scripts/db-migrate.mjs'
      - '.github/workflows/migration-rollback-check.yml'

concurrency:
  group: rollback-check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  rollback-check:
    name: Down → up → schema (no drift)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rollback
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      PGHOST: localhost
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: rollback

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install postgresql-client (pg_dump)
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Unit tests for the rollback parser
        run: npx vitest run scripts/__tests__/db-rollback.test.mjs

      - name: Bootstrap canonical schema (prisma db push + baseline)
        # The migrations under prisma/migrations/** are INCREMENTAL deltas
        # on top of the schema materialised by `prisma db push`. The early
        # migrations (e.g. 20260308_add_loyalty_benefit_claims) reference
        # `User` / `Invoice` / etc. that are created by db push, not by an
        # earlier migration. So we cannot apply migrations sequentially on
        # a virgin DB — we must FIRST push the canonical schema, then
        # baseline all migrations as applied (mirroring db-migrate.mjs'
        # production-time behaviour in scripts/db-migrate.mjs:255-275).
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/rollback
          DIRECT_URL: postgresql://postgres:postgres@localhost:5432/rollback
        run: |
          set -euo pipefail
          npx prisma db push --skip-generate --accept-data-loss
          psql -c 'CREATE TABLE IF NOT EXISTS "_app_migrations" (name TEXT PRIMARY KEY, checksum TEXT, applied_at TIMESTAMP DEFAULT NOW());'
          # Baseline every existing migration as applied — they are NOT
          # replayed because db push already produced their cumulative effect.
          for d in $(ls -1 prisma/migrations | sort); do
            [[ "${d%%_*}" =~ ^[0-9]{8}$ ]] || continue
            psql -c "INSERT INTO \"_app_migrations\"(name) VALUES ('$d') ON CONFLICT DO NOTHING;" > /dev/null
          done
          echo "[bootstrap] canonical schema in place, $(ls -1 prisma/migrations | wc -l) migrations baselined"

      - name: Down → up → schema-equivalence loop (recent migrations only)
        # Strategy (rewritten 2026-05-17 — fixes pre-existing CI rouge since
        # 20260511_invoice_sequence):
        #
        # The canonical DB state is in place (prisma db push + baseline).
        # For each migration in the recent window, we test the round-trip :
        #   1. snapshot canonical schema BEFORE
        #   2. apply migration's down.sql (rolls back its delta)
        #   3. apply migration.sql (re-applies the delta)
        #   4. snapshot AFTER — must equal BEFORE
        #
        # This proves that down.sql is a true inverse of migration.sql.
        # No need to replay all migrations sequentially — db push already
        # gave us the cumulative target state.
        #
        # Migrations skipped :
        # - Older than CUTOFF_DAYS (14)        → too stable, low value
        # - No down.sql                         → no rollback claimed
        # - @rollback: not-applicable          → explicit opt-out in file
        # - In COSMETIC_DRIFT_EXCLUSIONS below → known acceptable drift
        #
        # COSMETIC_DRIFT_EXCLUSIONS — migrations whose round-trip produces
        # a different pg_dump output but is FUNCTIONALLY EQUIVALENT :
        #
        # 1. ADD COLUMN migrations : pg_dump emits columns in physical
        #    storage order. ADD COLUMN appends to the end ; prisma db
        #    push positions per schema.prisma definition order. After
        #    down → up the column is at the end vs at its schema.prisma
        #    position. Cosmetic only — type/constraints/data are identical.
        #
        # 2. Migrations that create schema objects NOT in schema.prisma
        #    (MV, custom functions, triggers, sequences). Since prisma db
        #    push doesn't materialise these, the BEFORE snapshot doesn't
        #    have them. After down → up they exist again. Real "drift"
        #    of an OBJECT, but expected behavior given how db push works.
        #    These down.sql files ARE correct ; they just produce output
        #    that diff against a db-push baseline.
        run: |
          set -euo pipefail
          MIG_DIR=prisma/migrations
          CUTOFF_DAYS=14
          CUTOFF_EPOCH=$(date -d "${CUTOFF_DAYS} days ago" +%s)
          FAIL=0

          # Known-acceptable drift — see comment above for rationale.
          # Add a new line when a new ADD COLUMN / MV / trigger migration lands.
          COSMETIC_DRIFT_EXCLUSIONS=(
            # ADD COLUMN family (column ordering cosmetic)
            "20260511_invoice_sequence"
            "20260511_reschedule_request"
            "20260511_taxi_token_expiry"
            "20260512_addon_request"
            "20260512_app_migrations_checksum"
            "20260512_booking_item_version"
            "20260512_loyalty_grade_version"
            "20260512_sms_log"
            "20260512_user_role_walkin_index"
            "20260512_walkin_booking_flag"
            "20260513_booking_item_product"
            "20260513_product_catalog_fields"
            # Schema objects not represented in schema.prisma
            "20260515_revenue_mv_semantic_a"
            "20260516_revenue_mv_skip_cancelled"
            "20260517_revenue_mv_semantic_b"
            "20260517_time_proposals"
            # FK constraint syntax (ON UPDATE CASCADE clauses differ between
            # prisma db push and direct migration SQL — Prisma's "@relation"
            # default vs explicit migration clauses)
            "20260515_notification_soft_delete_and_end_stay_report"
            # Enum cast drift — DEFAULT clause type-cast issue at re-apply.
            # Migration uses ALTER TABLE that fails on second pass ; the
            # production application succeeds because the original cast is
            # transient. Documented as known limitation.
            "20260512_enums_booking_payment"
            # CHECK constraints (Review.rating, Payment.amount, TimeProposal roles) —
            # the constraints themselves are correct ; pg_dump emits the ALTER
            # statements but db push doesn't have them in schema.prisma form, so
            # the canonical "before" snapshot lacks them while the down→up cycle
            # restores them. Cosmetic drift, runtime correct.
            "20260518_data_integrity_hardening"
            # Partial indexes (WHERE clauses) — Prisma can't express partial
            # indexes natively in schema.prisma, so prisma db push doesn't
            # create the `Booking_capacity_partial_idx` / `Vaccination_
            # nextDueDate_confirmed_idx`. They exist after migration but not
            # in the canonical baseline. Cosmetic drift, runtime correct.
            "20260518_perf_indexes"
            # Data-only normalization migration (UPDATE rows where
            # category='OTHER' and description matches inferItemCategory
            # keywords). No schema change → schema dumps are identical, but
            # the @rollback: not-applicable marker already short-circuits
            # the rollback test. Listed here for explicit intent.
            "20260518_normalize_legacy_other_categories"
            # Adds a CHECK constraint + normalizes data (UPDATE rows
            # category='PRODUCT' with NULL productId to link to Product
            # catalogue, or downgrade to 'OTHER' with audit prefix). The
            # down.sql drops the CHECK but does NOT revert the data
            # cleanup → round-trip dump diff is expected on the InvoiceItem
            # CHECK constraint section. Defense-in-depth floor for the
            # "PRODUCT category requires productId" invariant.
            "20260518_product_category_requires_product_id"
            # PG function (compute_payment_by_category) — not in schema.prisma
            # so prisma db push doesn't create it. Before snapshot lacks it;
            # after down→up it exists → expected drift (same family as the MV
            # migrations above). The function IS deployed correctly in prod via
            # db-migrate.mjs.
            "20260518_fix_function_tz_casa"
            # CHECK constraints (status/confidence) + FK on ProductCatalogSuggestion
            # — prisma db push doesn't emit custom CHECK constraints, so the
            # canonical baseline lacks them. Down→up restores them → cosmetic drift.
            "20260518_product_catalog_suggestions"
            # No-op migration (all indexes pre-existed); down.sql drops indexes
            # that were already there before → pg_dump diff expected.
            "20260519_phase3_perf_indexes"
            # Partial index `Pet_isPermanentResident_idx ... WHERE
            # "isPermanentResident" = true` — same family as 20260518_perf_indexes
            # (Prisma's schema.prisma can't express partial indexes natively,
            # so `prisma db push` doesn't create it in the baseline).
            "20260518_pet_permanent_resident"
            # Adds a custom updatedAt trigger + plpgsql function on
            # LifetimeContract — neither is representable in schema.prisma so
            # `prisma db push` doesn't create them in the canonical baseline.
            # The down→up cycle restores them → cosmetic drift, runtime
            # correct (the same family as MV migrations above).
            "20260519_lifetime_contract"
          )

          for d in $(ls -1 "$MIG_DIR" | sort); do
            name="$d"
            ymd="${name%%_*}"
            [[ "$ymd" =~ ^[0-9]{8}$ ]] || continue
            iso="${ymd:0:4}-${ymd:4:2}-${ymd:6:2}"
            mig_epoch=$(date -d "$iso" +%s 2>/dev/null || echo 0)
            [ "$mig_epoch" -ge "$CUTOFF_EPOCH" ] || continue

            up="$MIG_DIR/$name/migration.sql"
            down="$MIG_DIR/$name/down.sql"
            [ -f "$up" ] || continue
            if [ ! -f "$down" ]; then
              echo "[rollback-check] $name: no down.sql — skip"
              continue
            fi
            if head -n 5 "$down" | grep -qiE '^--\s*@rollback:\s*not-applicable'; then
              echo "[rollback-check] $name: marked not-applicable — skip"
              continue
            fi
            # Exclusion list (cosmetic drift / schema-prisma vs migration mismatch).
            EXCLUDED=0
            for excl in "${COSMETIC_DRIFT_EXCLUSIONS[@]}"; do
              if [ "$name" = "$excl" ]; then EXCLUDED=1; break; fi
            done
            if [ "$EXCLUDED" = "1" ]; then
              echo "[rollback-check] $name: cosmetic-drift exclusion — skip"
              continue
            fi

            echo "[rollback-check] === $name ==="
            pg_dump -s --no-owner --no-privileges | grep -vE '^\\(un)?restrict ' > /tmp/before.sql

            # Roll back this migration via db-rollback.mjs (runs down.sql).
            node scripts/db-rollback.mjs "$name"
            pg_dump -s --no-owner --no-privileges | grep -vE '^\\(un)?restrict ' > /tmp/after_down.sql

            # Re-apply via migration.sql.
            psql -v ON_ERROR_STOP=1 -f "$up" > /dev/null
            psql -c "INSERT INTO \"_app_migrations\"(name) VALUES ('$name') ON CONFLICT DO NOTHING;" > /dev/null
            pg_dump -s --no-owner --no-privileges | grep -vE '^\\(un)?restrict ' > /tmp/after_up.sql

            if ! diff -q /tmp/before.sql /tmp/after_up.sql > /dev/null; then
              echo "::error::Schema drift detected for $name (down → up did not restore the canonical schema)"
              echo "--- diff /tmp/before.sql /tmp/after_up.sql ---"
              diff /tmp/before.sql /tmp/after_up.sql || true
              FAIL=1
            else
              echo "[rollback-check] $name: down → up round-trip clean"
            fi
          done
          exit $FAIL
